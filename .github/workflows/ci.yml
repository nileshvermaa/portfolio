name: CI

on:
  push:
    branches: [main, develop]
  pull_request:
    branches: [main]

concurrency:
  group: ci-${{ github.ref }}
  cancel-in-progress: true

jobs:
  quality:
    name: Lint & Build
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Lint
        run: npm run lint

      - name: Production build
        run: npm run build
        env:
          # Use a placeholder so build doesn't fail without the real key
          VITE_WEB3FORMS_KEY: ${{ secrets.VITE_WEB3FORMS_KEY || 'ci-placeholder' }}

      - name: Check dist size
        run: |
          echo "=== Build output sizes ==="
          du -sh dist/
          du -sh dist/assets/ 2>/dev/null || true
          echo "=== Largest files ==="
          find dist -type f | xargs ls -lhS 2>/dev/null | head -15
